---
- name: "Apache HTTPD 패키지 설치 최종본"
  hosts: apache_servers
  become: yes
  vars:
    apache_pkg: "{{ (ansible_os_family == 'RedHat') | ternary('httpd', 'apache2') }}"
    apache_conf_file: "{{ (ansible_os_family == 'RedHat') | ternary('/etc/httpd/conf/httpd.conf', '/etc/apache2/apache2.conf') }}"
    apache_user: "{{ (ansible_os_family == 'RedHat') | ternary('apache', 'www-data') }}"
    install_path: "/data/apache"

  tasks:
    - name: "STEP 1: 아파치 패키지 설치"
      package:
        name: "{{ apache_pkg }}"
        state: present

    - name: "STEP 2: 관리 디렉토리 생성"
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ apache_user }}"
        mode: '0755'
      loop:
        - "{{ install_path }}"
        - "{{ install_path }}/bin"
        - "{{ install_path }}/conf/extra"

    - name: "STEP 3: 무조건 링크 생성 (SHELL 명령)"
      shell: |
        ln -sf /usr/sbin/apache2ctl {{ install_path }}/bin/apachectl || \
        ln -sf /usr/sbin/apachectl {{ install_path }}/bin/apachectl || \
        ln -sf /usr/bin/apache2ctl {{ install_path }}/bin/apachectl
      args:
        warn: false

    - name: "STEP 4: 설정 파일 포함"
      lineinfile:
        path: "{{ apache_conf_file }}"
        line: "IncludeOptional {{ install_path }}/conf/extra/*.conf"
        insertafter: EOF

    - name: "STEP 5: 문법 체크"
      shell: "apache2ctl -t || httpd -t"
      register: syntax_check
      ignore_errors: yes

    - name: "STEP 6: 최종 확인"
      debug:
        msg: "모든 과정이 완료되었습니다. 로그에 STEP 6가 보인다면 성공입니다!"
