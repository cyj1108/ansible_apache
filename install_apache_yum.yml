---
- name: "Apache HTTPD 패키지 설치 및 환경 구성 (OS 통합형)"
  hosts: apache_servers
  become: yes
  vars:
    # OS별 패키지명 및 설정 경로 정의
    apache_pkg: "{{ (ansible_os_family == 'RedHat') | ternary('httpd', 'apache2') }}"
    apache_conf_file: "{{ (ansible_os_family == 'RedHat') | ternary('/etc/httpd/conf/httpd.conf', '/etc/apache2/apache2.conf') }}"
    apache_user: "{{ (ansible_os_family == 'RedHat') | ternary('apache', 'www-data') }}"
    install_path: "/data/apache"

  tasks:
    - name: "1. Apache 및 필수 모듈 설치"
      package:
        name: 
          - "{{ apache_pkg }}"
          - "{{ (ansible_os_family == 'RedHat') | ternary('mod_ssl', 'libapache2-mod-php') }}"
        state: present

    - name: "2. 관리용 디렉토리 생성 (/data/apache)"
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ apache_user }}"
        group: "{{ apache_user }}"
        mode: '0755'
      loop:
        - "{{ install_path }}"
        - "{{ install_path }}/conf/extra"
        - "{{ install_path }}/conf/ssl"
        - "{{ install_path }}/bin"

    - name: "3-1. 실제 apachectl 위치 확인"
      shell: "which {{ (ansible_os_family == 'RedHat') | ternary('apachectl', 'apache2ctl') }}"
      register: real_ctl_path
      ignore_errors: yes

    - name: "3-2. 실행 파일 심볼릭 링크 생성 (동적 경로 적용)"
      file:
        # 위에서 찾은 실제 경로를 사용하거나, 실패 시 기본값을 강제로 넣음
        src: "{{ real_ctl_path.stdout | default((ansible_os_family == 'RedHat') | ternary('/usr/sbin/apachectl', '/usr/sbin/apache2ctl')) }}"
        dest: "{{ install_path }}/bin/apachectl"
        state: link
        force: yes

    - name: "4. 사용자 정의 설정 파일 초기화"
      copy:
        dest: "{{ install_path }}/conf/extra/httpd-vhosts-custom.conf"
        content: "# Custom VirtualHost Configuration\n# Created by Ansible\n"
        owner: "{{ apache_user }}"
        group: "{{ apache_user }}"
        mode: '0644'

    - name: "5. 메인 설정 파일에 커스텀 경로 추가"
      lineinfile:
        path: "{{ apache_conf_file }}"
        line: "IncludeOptional {{ install_path }}/conf/extra/*.conf"
        insertafter: EOF
        state: present

    - name: "6. 필수 모듈 활성화 (RedHat)"
      replace:
        path: "{{ apache_conf_file }}"
        regexp: '^#LoadModule {{ item }}_module'
        replace: 'LoadModule {{ item }}_module'
      loop: [proxy, proxy_http, proxy_ajp, rewrite, slotmem_shm]
      when: ansible_os_family == "RedHat"

    - name: "6-2. 필수 모듈 활성화 (Ubuntu)"
      shell: "a2enmod {{ item }}"
      loop: [proxy, proxy_http, proxy_ajp, rewrite, ssl]
      when: ansible_os_family == "Debian"
      ignore_errors: yes

    - name: "7. 설정 파일 문법 검사"
      shell: "{{ (ansible_os_family == 'RedHat') | ternary('httpd -t', 'apache2ctl -t') }}"
      register: config_test
      ignore_errors: yes

    - name: "8. 결과 보고"
      debug:
        msg: 
          - "Apache 패키지 구성 완료"
          - "실제 실행파일 경로: {{ real_ctl_path.stdout | default('Not Found') }}"
          - "설정 검사 결과: {{ config_test.stdout | default('N/A') }}"
