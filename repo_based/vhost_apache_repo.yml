---
- name: "Apache vhost 표준 구성 작전 (repo 기반)"
  hosts: apache_servers
  become: yes
  vars:
    # 사령관님, 필요에 따라 아래 도메인명을 수정하십시오!
    domain_name: "my-service.local"
    doc_root: "/var/www/{{ domain_name }}"

  tasks:
    - name: "STEP 1: 웹 루트 디렉토리 생성"
      file:
        path: "{{ doc_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: "STEP 2: vhost 설정 파일 생성 (copy 모듈 활용)"
      copy:
        dest: "/etc/apache2/sites-available/{{ domain_name }}.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          <VirtualHost *:80>
              ServerName {{ domain_name }}
              DocumentRoot {{ doc_root }}

              <Directory {{ doc_root }}>
                  Options Indexes FollowSymLinks
                  AllowOverride All
                  Require all granted
              </Directory>

              ErrorLog ${APACHE_LOG_DIR}/{{ domain_name }}_error.log
              CustomLog ${APACHE_LOG_DIR}/{{ domain_name }}_access.log combined
          </VirtualHost>

    - name: "STEP 3: 사이트 활성화 (a2ensite)"
      command: "a2ensite {{ domain_name }}.conf"
      args:
        creates: "/etc/apache2/sites-enabled/{{ domain_name }}.conf"

    - name: "STEP 4: 기본 사이트 비활성화 (충돌 방지)"
      command: "a2dissite 000-default.conf"
      ignore_errors: yes
      register: dissite_result

    - name: "STEP 5: 테스트용 index.html 생성"
      copy:
        dest: "{{ doc_root }}/index.html"
        content: "<h1>{{ domain_name }} vhost 작전 성공! 사령관님 가즈아!</h1>"
        owner: www-data
        group: www-data
        mode: '0644'

    - name: "STEP 6: 아파치 설정 재로드"
      service:
        name: apache2
        state: reloaded
