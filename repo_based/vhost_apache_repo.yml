---
- name: "Apache repo_base vhost Set"
  hosts: apache_servers
  become: yes
  vars:
    # 1. 세마포어에서 target_domain 변수를 받음 (미입력 시 기본값 사용)
    domain_name: "{{ target_domain | default('test1108.dbinc.com') }}"
    
    # 2. 세마포어에서 target_port 변수를 받음 (미입력 시 80번 사용)
    listen_port: "{{ target_port | default(80) }}"
    
    # 3. 도메인에 따라 웹 루트 경로 자동 생성
    doc_root: "/var/www/{{ domain_name }}"

  tasks:
    - name: "STEP 1: 가변형 웹 루트 디렉토리 생성"
      file:
        path: "{{ doc_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: "STEP 2: 프롬프트 값 기반 vhost 설정 파일 생성"
      copy:
        dest: "/etc/apache2/sites-available/{{ domain_name }}.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          <VirtualHost *:{{ listen_port }}>
              ServerName {{ domain_name }}
              DocumentRoot {{ doc_root }}

              <Directory {{ doc_root }}>
                  Options Indexes FollowSymLinks
                  AllowOverride All
                  Require all granted
              </Directory>

              ErrorLog ${APACHE_LOG_DIR}/{{ domain_name }}_error.log
              CustomLog ${APACHE_LOG_DIR}/{{ domain_name }}_access.log combined
          </VirtualHost>

    - name: "STEP 3: 사이트 활성화 (a2ensite)"
      command: "a2ensite {{ domain_name }}.conf"
      args:
        creates: "/etc/apache2/sites-enabled/{{ domain_name }}.conf"

    - name: "STEP 4: 기존 기본 사이트 비활성화"
      command: "a2dissite 000-default.conf"
      ignore_errors: yes

    - name: "STEP 5: 가변 도메인 테스트용 index.html 생성"
      copy:
        dest: "{{ doc_root }}/index.html"
        content: "<h1>{{ domain_name }} (Port: {{ listen_port }}) 작전 성공! 사령관님 가즈아!</h1>"
        owner: www-data
        group: www-data
        mode: '0644'

    - name: "STEP 6: 아파치 설정 재로드"
      service:
        name: apache2
        state: reloaded

    - name: "📢 [최종 작전 보고서]"
      debug:
        msg: 
          - "=========================================="
          - "   프롬프트 제어 vhost 배포가 완료되었습니다!"
          - "=========================================="
          - "📍 설정 도메인: {{ domain_name }}"
          - "📍 설정 포트  : {{ listen_port }}"
          - "📍 웹 루트 경로: {{ doc_root }}"
          - "📍 서버 IP    : {{ ansible_host | default(inventory_hostname) }}"
          - "=========================================="
