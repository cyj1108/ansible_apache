---
- name: "Apache 포트 및 환경설정 정밀 개조 작전"
  hosts: apache_servers
  become: yes
  vars:
    # 사령관님이 원하시는 포트로 언제든 수정 가능합니다!
    http_port: 80
    https_port: 443
    # 성능 최적화 변수
    keep_alive_timeout: 5
    max_keep_alive_requests: 100
    server_tokens: "Prod"  # 보안상 서버 정보를 최소한만 노출 (Production)
    server_signature: "Off"

  tasks:
    - name: "STEP 1: 포트 설정 파일(ports.conf) 개조"
      copy:
        dest: "/etc/apache2/ports.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          # 사령관님의 명령에 따른 포트 배치도
          Listen {{ http_port }}

          <IfModule ssl_module>
              Listen {{ https_port }}
          </IfModule>

          <IfModule mod_gnutls.c>
              Listen {{ https_port }}
          </IfModule>
      notify: "Restart Apache"

    - name: "STEP 2: 보안 및 성능 설정(security.conf) 강화"
      lineinfile:
        path: "/etc/apache2/conf-available/security.conf"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^ServerTokens', line: 'ServerTokens {{ server_tokens }}' }
        - { regexp: '^ServerSignature', line: 'ServerSignature {{ server_signature }}' }
      notify: "Restart Apache"

    - name: "STEP 3: 아파치 메인 타임아웃 설정 변경"
      lineinfile:
        path: "/etc/apache2/apache2.conf"
        regexp: "^KeepAliveTimeout"
        line: "KeepAliveTimeout {{ keep_alive_timeout }}"
      notify: "Restart Apache"

    - name: "📢 [최종 환경설정 보고서]"
      debug:
        msg:
          - "=========================================="
          - "   APACHE 환경설정 개조가 완료되었습니다!"
          - "=========================================="
          - "📍 HTTP 포트  : {{ http_port }}"
          - "📍 HTTPS 포트 : {{ https_port }}"
          - "📍 보안 설정  : ServerTokens {{ server_tokens }}"
          - "📍 타임아웃   : {{ keep_alive_timeout }}s"
          - "=========================================="

  handlers:
    - name: "Restart Apache"
      service:
        name: apache2
        state: restarted