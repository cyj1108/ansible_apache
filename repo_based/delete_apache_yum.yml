---
- name: "Apache HTTPD repo 기반 삭제"
  hosts: apache_servers
  become: yes
  vars:
    # 설치 시 사용했던 변수들을 그대로 타격 지점으로 설정
    apache_pkg: "{{ (ansible_os_family == 'RedHat') | ternary('httpd', 'apache2') }}"
    apache_service: "{{ (ansible_os_family == 'RedHat') | ternary('httpd', 'apache2') }}"
    install_path: "/data/apache"

  tasks:
    - name: "STEP 1: 아파치 서비스 중단 및 비활성화"
      service:
        name: "{{ apache_service }}"
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: "STEP 2: 아파치 패키지 제거 (yum/apt 공통)"
      package:
        name: "{{ apache_pkg }}"
        state: absent

    - name: "STEP 3: /data/apache 관리 디렉토리 및 링크 강제 삭제"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ install_path }}"
        - "/etc/httpd"    # RedHat 잔재 소거
        - "/etc/apache2"  # Ubuntu 잔재 소거

    - name: "STEP 4: 설정 파일 포함 구문 제거 (선택 사항)"
      # 혹시 모를 설정 파일 내 잔여 오염을 방지합니다.
      lineinfile:
        path: "{{ (ansible_os_family == 'RedHat') | ternary('/etc/httpd/conf/httpd.conf', '/etc/apache2/apache2.conf') }}"
        regexp: "IncludeOptional {{ install_path }}/conf/extra/.*"
        state: absent
      ignore_errors: yes

    - name: "STEP 5: 삭제 확인 보고"
      debug:
        msg: "적진 정리 완료! {{ ansible_distribution }}에서 아파치가 완벽히 소거되었습니다."
