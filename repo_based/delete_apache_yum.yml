---
- name: "Apache HTTPD 패키지 repo 기반 삭제"
  hosts: apache_servers
  become: yes
  vars:
    # 설치 시와 동일한 OS별 패키지/서비스 명칭 사용
    apache_pkg: "{{ (ansible_os_family == 'RedHat') | ternary('httpd', 'apache2') }}"
    apache_service: "{{ (ansible_os_family == 'RedHat') | ternary('httpd', 'apache2') }}"

  tasks:
    - name: "STEP 1: 아파치 서비스 중단"
      service:
        name: "{{ apache_service }}"
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: "STEP 2: 아파치 표준 패키지 제거 (OS 명령어 기반)"
      package:
        name: "{{ apache_pkg }}"
        state: absent

    - name: "STEP 3: 최종 보고"
      debug:
        msg: "표준 삭제 완료! {{ ansible_distribution }}에서 아파치가 삭제 되었습니다."
