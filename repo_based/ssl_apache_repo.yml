---
- name: "Apache SSL 지능형 보안 강화 작전 (프롬프트 제어)"
  hosts: apache_servers
  become: yes
  vars:
    # 1. 세마포어 프롬프트에서 도메인과 인증서 파일명을 받음
    domain_name: "{{ target_domain | default('test1108.dbinc.com') }}"
    cert_file_name: "{{ target_cert_name | default('server') }}" # 예: server.crt의 'server' 부분
    
    # 2. 고정 경로 및 소스 경로 설정
    ssl_dest_path: "/etc/apache2/ssl"
    ssl_src_crt: "../ssl/{{ cert_file_name }}.crt"
    ssl_src_key: "../ssl/{{ cert_file_name }}.key"

  tasks:
    - name: "STEP 1: SSL 모듈 활성화"
      command: "a2enmod ssl"
      register: ssl_mod_result
      changed_when: "'already enabled' not in ssl_mod_result.stdout"

    - name: "STEP 2: 인증서 보관소 디렉토리 보안 설정"
      file:
        path: "{{ ssl_dest_path }}"
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: "STEP 3: 프롬프트 지정 인증서(CRT) 보급 및 갱신"
      copy:
        src: "{{ ssl_src_crt }}"
        dest: "{{ ssl_dest_path }}/{{ cert_file_name }}.crt"
        owner: root
        group: root
        mode: '0644'
      notify: "Restart Apache"

    - name: "STEP 4: 프롬프트 지정 비밀키(KEY) 보급 및 갱신"
      copy:
        src: "{{ ssl_src_key }}"
        dest: "{{ ssl_dest_path }}/{{ cert_file_name }}.key"
        owner: root
        group: root
        mode: '0600'
      notify: "Restart Apache"

    - name: "STEP 5: 가변 도메인 기반 SSL vhost 설정 적용"
      copy:
        dest: "/etc/apache2/sites-available/{{ domain_name }}-ssl.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          <VirtualHost *:443>
              ServerName {{ domain_name }}
              ServerAdmin webmaster@localhost
              DocumentRoot /var/www/{{ domain_name }}

              SSLEngine on
              SSLCertificateFile {{ ssl_dest_path }}/{{ cert_file_name }}.crt
              SSLCertificateKeyFile {{ ssl_dest_path }}/{{ cert_file_name }}.key

              <Directory /var/www/{{ domain_name }}>
                  AllowOverride All
                  Require all granted
              </Directory>

              ErrorLog ${APACHE_LOG_DIR}/{{ domain_name }}_ssl_error.log
              CustomLog ${APACHE_LOG_DIR}/{{ domain_name }}_ssl_access.log combined
          </VirtualHost>
      notify: "Restart Apache"

    - name: "STEP 6: SSL 사이트 활성화"
      command: "a2ensite {{ domain_name }}-ssl.conf"
      register: ensite_result
      changed_when: "'already enabled' not in ensite_result.stdout"
      notify: "Restart Apache"

    - name: "📢 [SSL 작전 보고서]"
      debug:
        msg:
          - "=========================================="
          - "   지능형 SSL 보안 설정이 완료되었습니다!"
          - "=========================================="
          - "📍 적용 도메인: {{ domain_name }}"
          - "📍 사용 인증서: {{ cert_file_name }}.crt"
          - "📍 HTTPS 포트 : 443"
          - "📍 상태: 인증서 배포 및 갱신 자동화 활성"
          - "=========================================="

  handlers:
    - name: "Restart Apache"
      service:
        name: apache2
        state: restarted