---
- name: "Apache SSL 보안 강화 및 인증서 갱신 작전"
  hosts: apache_servers
  become: yes
  vars:
    ssl_dest_path: "/etc/apache2/ssl"
    # 사령관님, 깃허브 내 실제 인증서 파일 경로를 지정하십시오 (상대경로 가능)
    ssl_src_crt: "ssl/server.crt"
    ssl_src_key: "ssl/server.key"

  tasks:
    - name: "STEP 1: SSL 모듈 및 관련 의존성 활성화"
      command: "a2enmod ssl"
      register: ssl_mod_result
      changed_when: "'already enabled' not in ssl_mod_result.stdout"

    - name: "STEP 2: 인증서 보관 진지 구축 (디렉토리)"
      file:
        path: "{{ ssl_dest_path }}"
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: "STEP 3: 깃허브로부터 인증서(CRT) 보급 및 갱신"
      copy:
        src: "{{ ssl_src_crt }}"
        dest: "{{ ssl_dest_path }}/server.crt"
        owner: root
        group: root
        mode: '0644'
      notify: "Restart Apache" # 파일 내용이 바뀌면(갱신되면) 핸들러 호출!

    - name: "STEP 4: 깃허브로부터 비밀키(KEY) 보급 및 갱신"
      copy:
        src: "{{ ssl_src_key }}"
        dest: "{{ ssl_dest_path }}/server.key"
        owner: root
        group: root
        mode: '0600' # 키 파일은 보안상 엄격하게 관리!
      notify: "Restart Apache"

    - name: "STEP 5: SSL vhost 설정 정교화"
      copy:
        dest: "/etc/apache2/sites-available/default-ssl.conf"
        owner: root
        group: root
        mode: '0644'
        content: |
          <VirtualHost *:443>
              ServerAdmin webmaster@localhost
              DocumentRoot /var/www/html

              SSLEngine on
              SSLCertificateFile {{ ssl_dest_path }}/server.crt
              SSLCertificateKeyFile {{ ssl_dest_path }}/server.key

              <Directory /var/www/html>
                  AllowOverride All
                  Require all granted
              </Directory>

              ErrorLog ${APACHE_LOG_DIR}/ssl_error.log
              CustomLog ${APACHE_LOG_DIR}/ssl_access.log combined
          </VirtualHost>
      notify: "Restart Apache"

    - name: "STEP 6: SSL 사이트 활성화 (a2ensite)"
      command: "a2ensite default-ssl.conf"
      register: ensite_result
      changed_when: "'already enabled' not in ensite_result.stdout"
      notify: "Restart Apache"

    - name: "📢 [SSL 작전 결과 보고]"
      debug:
        msg:
          - "=========================================="
          - "   SSL 암호화 통신 설정이 완료되었습니다!"
          - "=========================================="
          - "📍 포트: 443 (HTTPS)"
          - "📍 인증서 경로: {{ ssl_dest_path }}"
          - "📍 상태: 인증서 배포 및 갱신 자동화 활성"
          - "=========================================="

  handlers:
    - name: "Restart Apache"
      service:
        name: apache2
        state: restarted
