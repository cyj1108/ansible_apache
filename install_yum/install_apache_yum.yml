---
- name: "Apache HTTPD YUM 패키지 설치 및 환경 구성"
  hosts: apache_servers
  become: yes
  vars:
    install_path: "/data/apache"
    httpd_conf_path: "/etc/httpd/conf/httpd.conf"

  tasks:
    - name: "1. Apache 및 필수 모듈 YUM 설치"
      yum:
        name: [httpd, mod_ssl, mod_proxy_html]
        state: present

    - name: "2. 관리용 디렉토리 생성 (/data/apache)"
      file:
        path: "{{ item }}"
        state: directory
        owner: apache
        group: apache
        mode: '0755'
      loop:
        - "{{ install_path }}"
        - "{{ install_path }}/conf/extra"
        - "{{ install_path }}/conf/ssl"
        - "{{ install_path }}/bin"

    - name: "3. 실행 파일 심볼릭 링크 생성 (기존 제어 스크립트 호환)"
      file:
        src: "/usr/sbin/apachectl"
        dest: "{{ install_path }}/bin/apachectl"
        state: link

    - name: "4. 사용자 정의 설정 파일 초기화 (더미 주석 포함)"
      copy:
        dest: "{{ install_path }}/conf/extra/httpd-vhosts-custom.conf"
        content: "# Custom VirtualHost Configuration\n# Created by Ansible Sangbyeong Operation\n"
        owner: apache
        group: apache
        mode: '0644'

    - name: "5. 메인 설정 파일에 커스텀 경로 추가 (Include)"
      lineinfile:
        path: "{{ httpd_conf_path }}"
        line: "IncludeOptional {{ install_path }}/conf/extra/*.conf"
        insertafter: EOF
        state: present

    - name: "6. 필수 모듈 활성화 (YUM 표준)"
      replace:
        path: "{{ httpd_conf_path }}"
        regexp: '^#LoadModule {{ item }}_module'
        replace: 'LoadModule {{ item }}_module'
      loop: [proxy, proxy_http, proxy_ajp, rewrite, slotmem_shm]

    - name: "7. 설정 파일 문법 최종 검토 (Syntax Check)"
      shell: "httpd -t"
      register: config_test

    - name: "8. 결과 보고 (가동은 메뉴 2번에서)"
      debug:
        msg: "YUM 설치 및 구성이 완료되었습니다. 서비스 가동은 메뉴 2번을 이용하십시오!"
